<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="control-panel">
        <h1>Timer Control Panel</h1>

        <div class="time-input">
            <label for="minutes">Minutes:</label>
            <input type="number" id="minutes" min="0" max="99" value="5">
            <label for="seconds">Seconds:</label>
            <input type="number" id="seconds" min="0" max="59" value="0">
        </div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="customization">
            <h2>Customization</h2>
            <div class="color-picker">
                <label for="textColor">Text Color:</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>
            <div class="color-picker">
                <label for="backgroundColor">Background Color:</label>
                <input type="color" id="backgroundColor" value="#000000">
            </div>
            <div class="font-selector">
                <label for="fontFamily">Font Family:</label>
                <select id="fontFamily">
                    <option value="Arial">Arial</option>
                    <option value="Helvetica">Helvetica</option>
                    <option value="Monaco">Monaco</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </div>
            <div class="font-size">
                <label for="fontSize">Font Size:</label>
                <input type="range" id="fontSize" min="20" max="200" value="100">
            </div>
            <div class="end-message">
                <label for="endMessage">End Message:</label>
                <input type="text" id="endMessage" value="TIME">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
</body>
</html>
