<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="local-fonts=self">
    <title>Timer Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="control-panel">
        <h1>Timer Control Panel</h1>

        <div class="time-input">
            <label for="minutes">Minutes:</label>
            <input type="number" id="minutes" min="0" max="99" value="3">
            <label for="seconds">Seconds:</label>
            <input type="number" id="seconds" min="0" max="59" value="0">
        </div>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="customization">
            <h2>Customization</h2>
            <div class="color-picker">
                <label for="textColor">Text Color:</label>
                <input type="color" id="textColor" value="#000000">
            </div>
            <div class="color-picker">
                <label for="backgroundColor">Background Color:</label>
                <input type="color" id="backgroundColor" value="#00ff00">
            </div>
            <div class="font-selector">
                <label for="fontFamily">Font Family:</label>
                <select id="fontFamily">
                    <option value="Arial">Arial</option>
                </select>
                <label for="fontVariant">Font Variant:</label>
                <select id="fontVariant">
                    <option value="normal">Normal</option>
                </select>
            </div>
            <!-- Inline color warning placeholder -->
            <div id="color-warning-placeholder"></div>
            <div class="font-size">
                <label for="fontSize">Font Size:</label>
                <input type="range" id="fontSize" min="20" max="200" value="100">
            </div>
            <div class="google-font">
                <label for="googleFontUrl">Google Font URL:</label>
                <input type="text" id="googleFontUrl" placeholder="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap">
                <div id="detected-font-container" style="display: none; margin-top: 0.5em;">
                    <strong>Detected Font Family:</strong> <span id="detected-font-name"></span>
                </div>
                <input type="hidden" id="googleFontFamily">
                <button type="button" id="addGoogleFontBtn">Add Font</button>
                <small>Paste a Google Fonts CSS URL. The font family name will be automatically detected.</small>
                <div id="google-font-feedback" style="margin-top: 0.5em;"></div>
            </div>
            <div class="end-message">
                <label for="endMessage">End Message:</label>
                <input type="text" id="endMessage" value="TIME">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
</body>
</html>
