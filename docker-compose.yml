services:
  fighttimer:
    image: themightypong/fighttimer-web:latest
    container_name: fighttimer
    ports:
      - "${HOST_PORT:-55011}:55011"
    volumes:
      - fighttimer_fonts:/app/static/fonts/google
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:?Set FLASK_SECRET_KEY in .env}
      - PORT=55011
    restart: unless-stopped

volumes:
  fighttimer_fonts:
